<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mentor Portal</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
  * { font-family: 'Inter', sans-serif; }
  .fade-in { animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
  .spin { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body class="bg-gray-50 min-h-screen">

<!-- ═══════════════════════════════════ APP ═══════════════════════════════════ -->
<div id="app"></div>

<script>
// ─── State ────────────────────────────────────────────────────────────────────
const state = {
  page: 'auth',        // auth | dashboard | add-student | view-students | view-student | edit-student
  user: null,
  token: null,
  fullName: null,
  selectedStudentId: null,
  students: [],
  currentStudent: null,
  stats: { totalStudents:0, studentsWithArrears:0, lowCGPAStudents:0, scholarshipStudents:0 }
};

// Load persisted auth
const saved = JSON.parse(localStorage.getItem('mentor_auth') || 'null');
if (saved) { state.user = saved.user; state.token = saved.token; state.fullName = saved.fullName; state.page = 'dashboard'; }

// ─── API ──────────────────────────────────────────────────────────────────────
async function api(method, path, body = null) {
  const opts = {
    method,
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${state.token || ''}` }
  };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(path, opts);
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Request failed');
  return data;
}

// ─── Navigation ───────────────────────────────────────────────────────────────
function navigate(page, studentId = null) {
  state.page = page;
  state.selectedStudentId = studentId;
  render();
  if (page === 'dashboard') loadStats();
  if (page === 'view-students') loadStudents();
  if (page === 'view-student' && studentId) loadStudent(studentId);
  if (page === 'edit-student' && studentId) loadStudent(studentId);
}

async function loadStats() {
  try {
    state.stats = await api('GET', '/api/stats');
    renderStats();
  } catch(e) { console.error(e); }
}

async function loadStudents() {
  try {
    state.students = await api('GET', '/api/students');
    renderStudentTable(state.students);
  } catch(e) { showError('students-error', e.message); }
}

async function loadStudent(id) {
  try {
    state.currentStudent = await api('GET', `/api/students/${id}`);
    if (state.page === 'view-student') renderStudentProfile();
    if (state.page === 'edit-student') populateEditForm();
  } catch(e) { console.error(e); }
}

// ─── Render ───────────────────────────────────────────────────────────────────
function render() {
  const app = document.getElementById('app');
  if (state.page === 'auth') { app.innerHTML = renderAuth(); bindAuth(); return; }
  
  app.innerHTML = `
    ${renderNav()}
    <div id="page-content" class="fade-in">
      ${state.page === 'dashboard'    ? renderDashboard()    : ''}
      ${state.page === 'add-student'  ? renderAddStudent()   : ''}
      ${state.page === 'view-students'? renderViewStudents() : ''}
      ${state.page === 'view-student' ? renderViewStudent()  : ''}
      ${state.page === 'edit-student' ? renderEditStudent()  : ''}
    </div>
  `;
  bindPageEvents();
}

// ─── Auth Page ────────────────────────────────────────────────────────────────
function renderAuth() {
  return `
  <div class="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-md p-8 fade-in">
      <div class="flex justify-center mb-6">
        <div class="bg-blue-600 p-3 rounded-full">
          <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14l9-5-9-5-9 5 9 5z"/>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z"/>
          </svg>
        </div>
      </div>
      <h1 class="text-3xl font-bold text-center text-gray-800 mb-2">Mentor Portal</h1>
      <p id="auth-subtitle" class="text-center text-gray-600 mb-8">Sign in to manage your students</p>
      <div id="auth-error" class="hidden bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg mb-4 text-sm"></div>
      <div id="auth-success" class="hidden bg-green-50 border border-green-200 text-green-700 px-4 py-3 rounded-lg mb-4 text-sm"></div>

      <div id="signup-field" class="hidden mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-2">Full Name</label>
        <input id="full-name" type="text" placeholder="John Doe" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition"/>
      </div>
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-2">Email Address</label>
        <input id="auth-email" type="email" placeholder="mentor@college.edu" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition"/>
      </div>
      <div class="mb-6">
        <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
        <input id="auth-password" type="password" placeholder="••••••••" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition"/>
      </div>
      <button id="auth-submit" onclick="handleAuth()" class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 transition">Sign In</button>
      <div class="mt-6 text-center">
        <button onclick="toggleAuthMode()" class="text-blue-600 hover:text-blue-700 font-medium text-sm" id="auth-toggle">Don't have an account? Sign Up</button>
      </div>
    </div>
  </div>`;
}

let isLogin = true;
function bindAuth() {
  document.getElementById('auth-email').addEventListener('keydown', e => { if(e.key==='Enter') handleAuth(); });
  document.getElementById('auth-password').addEventListener('keydown', e => { if(e.key==='Enter') handleAuth(); });
}
function toggleAuthMode() {
  isLogin = !isLogin;
  document.getElementById('signup-field').classList.toggle('hidden', isLogin);
  document.getElementById('auth-subtitle').textContent = isLogin ? 'Sign in to manage your students' : 'Create your mentor account';
  document.getElementById('auth-submit').textContent = isLogin ? 'Sign In' : 'Sign Up';
  document.getElementById('auth-toggle').textContent = isLogin ? "Don't have an account? Sign Up" : 'Already have an account? Sign In';
  document.getElementById('auth-error').classList.add('hidden');
  document.getElementById('auth-success').classList.add('hidden');
}
async function handleAuth() {
  const email = document.getElementById('auth-email').value.trim();
  const password = document.getElementById('auth-password').value;
  const errEl = document.getElementById('auth-error');
  const btn = document.getElementById('auth-submit');
  errEl.classList.add('hidden');

  if (!email || !password) { errEl.textContent = 'Email and password are required'; errEl.classList.remove('hidden'); return; }

  btn.textContent = 'Please wait...'; btn.disabled = true;
  try {
    let data;
    if (isLogin) {
      data = await api('POST', '/api/auth/signin', { email, password });
    } else {
      const fullName = document.getElementById('full-name').value.trim();
      if (!fullName) { errEl.textContent = 'Full name is required'; errEl.classList.remove('hidden'); btn.textContent='Sign Up'; btn.disabled=false; return; }
      data = await api('POST', '/api/auth/signup', { email, password, full_name: fullName });
      document.getElementById('auth-success').textContent = 'Account created! Please check your email to confirm, then sign in.';
      document.getElementById('auth-success').classList.remove('hidden');
      toggleAuthMode();
      btn.textContent='Sign In'; btn.disabled=false;
      return;
    }
    state.user = data.user; state.token = data.access_token; state.fullName = data.full_name;
    localStorage.setItem('mentor_auth', JSON.stringify({ user: state.user, token: state.token, fullName: state.fullName }));
    navigate('dashboard');
  } catch(e) {
    errEl.textContent = e.message; errEl.classList.remove('hidden');
    btn.textContent = isLogin ? 'Sign In' : 'Sign Up'; btn.disabled = false;
  }
}

// ─── Nav ──────────────────────────────────────────────────────────────────────
function renderNav() {
  return `
  <nav class="bg-white shadow-sm border-b border-gray-200 sticky top-0 z-10">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-16">
        <div class="flex items-center gap-3">
          <div class="bg-blue-600 p-1.5 rounded-lg">
            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14l9-5-9-5-9 5 9 5z"/>
            </svg>
          </div>
          <button onclick="navigate('dashboard')" class="text-lg font-bold text-gray-800 hover:text-blue-600 transition">Mentor Portal</button>
        </div>
        <div class="flex items-center gap-4">
          <span class="text-sm text-gray-600 hidden sm:block">Welcome, <strong>${state.fullName || 'Mentor'}</strong></span>
          <button onclick="handleSignOut()" class="flex items-center gap-2 px-3 py-2 text-sm text-red-600 hover:bg-red-50 rounded-lg transition">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
            Logout
          </button>
        </div>
      </div>
    </div>
  </nav>`;
}
function handleSignOut() {
  state.user = null; state.token = null; state.fullName = null; state.page = 'auth';
  localStorage.removeItem('mentor_auth');
  isLogin = true; render();
}

// ─── Dashboard ────────────────────────────────────────────────────────────────
function renderDashboard() {
  return `

      <p class="text-gray-500">Monitor and manage your mentee students</p>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8" id="stats-grid">
      ${renderStatCards()}
    </div>
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
      <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-200">
        <h3 class="text-lg font-semibold text-gray-900 mb-4">Quick Actions</h3>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <button onclick="navigate('add-student')" class="flex items-center gap-3 p-4 bg-blue-50 border border-blue-200 rounded-lg hover:bg-blue-100 transition text-left">
            <div class="bg-blue-600 p-2 rounded-lg flex-shrink-0">
              <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/></svg>
            </div>
            <div><p class="font-semibold text-gray-900 text-sm">Add New Student</p><p class="text-xs text-gray-500">Register a new mentee</p></div>
          </button>
          <button onclick="navigate('view-students')" class="flex items-center gap-3 p-4 bg-green-50 border border-green-200 rounded-lg hover:bg-green-100 transition text-left">
            <div class="bg-green-600 p-2 rounded-lg flex-shrink-0">
              <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
            </div>
            <div><p class="font-semibold text-gray-900 text-sm">View All Students</p><p class="text-xs text-gray-500">Search and manage students</p></div>
          </button>
        </div>
      </div>
      <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-200">
        <h3 class="text-lg font-semibold text-gray-900 mb-4">📢 Send Announcement</h3>
        <div id="ann-success" class="hidden bg-green-50 border border-green-200 text-green-700 px-3 py-2 rounded-lg mb-3 text-sm"></div>
        <div id="ann-error" class="hidden bg-red-50 border border-red-200 text-red-700 px-3 py-2 rounded-lg mb-3 text-sm"></div>
        <textarea id="ann-msg" rows="4" placeholder="Write announcement to all your students..." class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none resize-none text-sm"></textarea>
        <button onclick="sendAnnouncement()" id="ann-btn" class="mt-3 px-5 py-2 bg-blue-600 text-white rounded-lg font-semibold hover:bg-blue-700 transition text-sm">Send to All Students</button>
      </div>
    </div>
  </div>`;
}
function renderStatCards() {
  const s = state.stats;
  const cards = [
    { title:'Total Students', value: s.totalStudents, color:'blue', icon:'M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0' },
    { title:'Students with Arrears', value: s.studentsWithArrears, color:'red', icon:'M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z' },
    { title:'Low CGPA (<7.0)', value: s.lowCGPAStudents, color:'orange', icon:'M13 17h8m0 0V9m0 8l-8-8-4 4-6-6' },
    { title:'Scholarship Students', value: s.scholarshipStudents, color:'green', icon:'M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z' }
  ];
  return cards.map(c => `
    <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-200 hover:shadow-md transition">
      <div class="bg-${c.color}-50 p-3 rounded-lg w-fit mb-4">
        <svg class="w-6 h-6 text-${c.color}-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="${c.icon}"/></svg>
      </div>
      <p class="text-gray-500 text-sm font-medium mb-1">${c.title}</p>
      <p class="text-3xl font-bold text-gray-900">${c.value}</p>
    </div>`).join('');
}
function renderStats() {
  const grid = document.getElementById('stats-grid');
  if (grid) grid.innerHTML = renderStatCards();
}
async function sendAnnouncement() {
  const msg = document.getElementById('ann-msg').value.trim();
  const btn = document.getElementById('ann-btn');
  const errEl = document.getElementById('ann-error');
  const sucEl = document.getElementById('ann-success');
  errEl.classList.add('hidden'); sucEl.classList.add('hidden');
  if (!msg) { errEl.textContent='Please write a message first.'; errEl.classList.remove('hidden'); return; }
  btn.textContent='Sending...'; btn.disabled=true;
  try {
    const res = await api('POST', '/api/announcement', { message: msg });
    sucEl.textContent = `✅ Sent to ${res.sent} of ${res.total} students!`;
    sucEl.classList.remove('hidden');
    document.getElementById('ann-msg').value = '';
  } catch(e) {
    errEl.textContent = e.message; errEl.classList.remove('hidden');
  } finally { btn.textContent='Send to All Students'; btn.disabled=false; }
}

// ─── Add Student ──────────────────────────────────────────────────────────────
const bloodGroups = ['A+','A-','B+','B-','AB+','AB-','O+','O-'];
function studentFormFields(data = {}) {
  const f = (name, label, type='text', required=true, extra='') => `
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">${label}${required?' <span class="text-red-500">*</span>':''}</label>
      <input type="${type}" name="${name}" value="${data[name]||''}" ${required?'required':''} ${extra}
        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none text-sm" />
    </div>`;
  const t = (name, label, required=false) => `
    <div class="md:col-span-2">
      <label class="block text-sm font-medium text-gray-700 mb-1">${label}</label>
      <textarea name="${name}" rows="2" ${required?'required':''}
        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none text-sm resize-none">${data[name]||''}</textarea>
    </div>`;
  return `
    <h3 class="text-base font-semibold text-gray-900 mb-3 pb-2 border-b">Personal Information</h3>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
      ${f('student_name','Student Name')}
      ${f('register_number','Register Number')}
      ${f('phone_number','Phone Number','tel')}
      ${f('email','Email','email')}
      ${f('date_of_birth','Date of Birth','date')}
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Blood Group <span class="text-red-500">*</span></label>
        <select name="blood_group" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-sm">
          <option value="">Select Blood Group</option>
          ${bloodGroups.map(g=>`<option value="${g}" ${data.blood_group===g?'selected':''}>${g}</option>`).join('')}
        </select>
      </div>
      <div class="md:col-span-2">
        <label class="block text-sm font-medium text-gray-700 mb-1">Address <span class="text-red-500">*</span></label>
        <textarea name="address" rows="2" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-sm resize-none">${data.address||''}</textarea>
      </div>
    </div>
    <h3 class="text-base font-semibold text-gray-900 mb-3 pb-2 border-b">Parent Information</h3>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
      ${f('parent_name','Parent Name')}
      ${f('parent_occupation','Parent Occupation')}
      ${f('parent_phone','Parent Phone','tel')}
    </div>
    <h3 class="text-base font-semibold text-gray-900 mb-3 pb-2 border-b">Academic Information</h3>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
      ${f('cgpa','CGPA','number',true,'step="0.01" min="0" max="10"')}
      ${f('gpa','GPA (Current Semester)','number',true,'step="0.01" min="0" max="10"')}
      ${t('arrears_details','Arrears Details (e.g. CS101, MA102 or leave blank)')}
    </div>
    <h3 class="text-base font-semibold text-gray-900 mb-3 pb-2 border-b">Additional Information</h3>
    <div class="grid grid-cols-1 gap-4">
      ${t('siblings_details','Siblings Details')}
      ${t('scholarship_details','Scholarship Details')}
      ${t('hackathon_details','Hackathon Details')}
    </div>`;
}

function renderAddStudent() {
  return `
  <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8">

// ─── View Students ────────────────────────────────────────────────────────────
function renderViewStudents() {
  return `
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <button onclick="navigate('dashboard')" class="flex items-center gap-2 text-gray-600 hover:text-gray-900 mb-4 text-sm">← Back to Dashboard</button>
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6">
      <h1 class="text-2xl font-bold text-gray-900">All Students</h1>
      <button onclick="downloadCSV()" class="flex items-center gap-2 px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition text-sm font-medium">
        ⬇ Download CSV
      </button>
    </div>
    <div class="mb-4">
      <input id="search-input" type="text" placeholder="🔍  Search by name or register number..."
        oninput="filterStudents(this.value)"
        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none text-sm"/>
    </div>
    <div id="students-error" class="hidden bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg mb-4 text-sm"></div>
    <div id="students-table">
      <div class="flex justify-center items-center h-48">
        <div class="w-10 h-10 border-4 border-blue-600 border-t-transparent rounded-full spin"></div>
      </div>
    </div>
    <p id="students-count" class="mt-3 text-sm text-gray-500"></p>
  </div>`;
}

function renderStudentTable(students) {
  const container = document.getElementById('students-table');
  const countEl = document.getElementById('students-count');
  if (!container) return;
  if (!students || students.length === 0) {
    container.innerHTML = `<div class="bg-white rounded-xl border border-gray-200 p-12 text-center"><p class="text-gray-500">No students found.</p></div>`;
    if (countEl) countEl.textContent = '';
    return;
  }
  container.innerHTML = `
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
      <div class="overflow-x-auto">
        <table class="min-w-full divide-y divide-gray-200 text-sm">
          <thead class="bg-gray-50">
            <tr>
              <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Reg. No.</th>
              <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Name</th>
              <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Email</th>
              <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">CGPA</th>
              <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Arrears</th>
              <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Actions</th>
            </tr>
          </thead>
          <tbody class="divide-y divide-gray-200">
            ${students.map(s => `
            <tr class="hover:bg-gray-50 transition">
              <td class="px-4 py-3 font-medium text-gray-900">${s.register_number}</td>
              <td class="px-4 py-3">
                <button onclick="navigate('view-student','${s.id}')" class="text-blue-600 hover:text-blue-800 font-medium">${s.student_name}</button>
              </td>
              <td class="px-4 py-3 text-gray-600">${s.email}</td>
              <td class="px-4 py-3 font-semibold ${parseFloat(s.cgpa)>=7.5?'text-green-600':parseFloat(s.cgpa)>=6.0?'text-yellow-600':'text-red-600'}">${parseFloat(s.cgpa).toFixed(2)}</td>
              <td class="px-4 py-3">
                ${s.arrears_details && s.arrears_details.trim()
                  ? '<span class="px-2 py-0.5 text-xs font-medium bg-red-100 text-red-800 rounded-full">Yes</span>'
                  : '<span class="px-2 py-0.5 text-xs font-medium bg-green-100 text-green-800 rounded-full">No</span>'}
              </td>
              <td class="px-4 py-3">
                <div class="flex gap-1">
                  <button onclick="navigate('view-student','${s.id}')" title="View" class="p-1.5 text-blue-600 hover:bg-blue-50 rounded transition">👁</button>
                  <button onclick="navigate('edit-student','${s.id}')" title="Edit" class="p-1.5 text-yellow-600 hover:bg-yellow-50 rounded transition">✏️</button>
                  <button onclick="deleteStudent('${s.id}','${s.student_name.replace(/'/g,"\\'")}','${s.register_number}')" title="Delete" class="p-1.5 text-red-600 hover:bg-red-50 rounded transition">🗑</button>
                </div>
              </td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>`;
  if (countEl) countEl.textContent = `Showing ${students.length} student${students.length!==1?'s':''}`;
}

function filterStudents(term) {
  const filtered = !term.trim() ? state.students
    : state.students.filter(s =>
        s.student_name.toLowerCase().includes(term.toLowerCase()) ||
        s.register_number.toLowerCase().includes(term.toLowerCase()));
  renderStudentTable(filtered);
  const countEl = document.getElementById('students-count');
  if (countEl) countEl.textContent = `Showing ${filtered.length} of ${state.students.length} student${state.students.length!==1?'s':''}`;
}

async function deleteStudent(id, name, reg) {
  if (!confirm(`Are you sure you want to delete ${name} (${reg})?`)) return;
  try {
    await api('DELETE', `/api/students/${id}`);
    state.students = state.students.filter(s => s.id !== id);
    renderStudentTable(state.students);
    loadStats();
  } catch(e) { alert('Failed to delete: ' + e.message); }
}

function downloadCSV() {
  if (!state.students.length) { alert('No students to download'); return; }
  const headers = ['Student Name','Register Number','Phone','Email','DOB','Blood Group','Address','Parent Name','Parent Occupation','Parent Phone','CGPA','GPA','Arrears','Scholarship','Hackathons','Siblings'];
  const rows = state.students.map(s => [
    `"${s.student_name}"`, s.register_number, s.phone_number, s.email,
    s.date_of_birth, s.blood_group, `"${s.address}"`,
    `"${s.parent_name}"`, `"${s.parent_occupation}"`, s.parent_phone,
    s.cgpa, s.gpa,
    `"${s.arrears_details||'None'}"`, `"${s.scholarship_details||'None'}"`,
    `"${s.hackathon_details||'None'}"`, `"${s.siblings_details||'None'}"`
  ].join(','));
  const csv = [headers.join(','), ...rows].join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = `students_${new Date().toISOString().split('T')[0]}.csv`;
  a.click();
}

// ─── View Student Profile ─────────────────────────────────────────────────────
function renderViewStudent() {
  if (!state.currentStudent) return `<div class="max-w-5xl mx-auto px-4 py-8"><div class="flex justify-center h-48 items-center"><div class="w-10 h-10 border-4 border-blue-600 border-t-transparent rounded-full spin"></div></div></div>`;
  const s = state.currentStudent;
  return `
  <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <button onclick="navigate('view-students')" class="flex items-center gap-2 text-gray-600 hover:text-gray-900 mb-4 text-sm">← Back to Students</button>
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6">
      <div>
        <h1 class="text-2xl font-bold text-gray-900">${s.student_name}</h1>
        <p class="text-gray-500">${s.register_number}</p>
      </div>
      <div class="flex gap-2">
        <button onclick="navigate('edit-student','${s.id}')" class="flex items-center gap-2 px-4 py-2 bg-yellow-500 text-white rounded-lg hover:bg-yellow-600 transition text-sm font-medium">✏️ Edit</button>
        <button onclick="downloadProfile()" class="flex items-center gap-2 px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition text-sm font-medium">⬇ Download</button>
      </div>
    </div>
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
      <div class="lg:col-span-2 space-y-6">
        <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-200">
          <h2 class="text-base font-semibold text-gray-900 mb-4 pb-2 border-b">Personal Information</h2>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm">
            ${profileField('📧 Email', s.email)}
            ${profileField('📞 Phone', s.phone_number)}
            ${profileField('📅 Date of Birth', new Date(s.date_of_birth).toLocaleDateString('en-IN'))}
            ${profileField('🩸 Blood Group', s.blood_group)}
            <div class="md:col-span-2">${profileField('📍 Address', s.address)}</div>
          </div>
        </div>
        <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-200">
          <h2 class="text-base font-semibold text-gray-900 mb-4 pb-2 border-b">Parent Information</h2>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm">
            ${profileField('👤 Parent Name', s.parent_name)}
            ${profileField('💼 Occupation', s.parent_occupation)}
            ${profileField('📞 Parent Phone', s.parent_phone)}
          </div>
        </div>
        <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-200">
          <h2 class="text-base font-semibold text-gray-900 mb-4 pb-2 border-b">Additional Details</h2>
          <div class="space-y-3 text-sm">
            ${profileField('👥 Siblings', s.siblings_details || 'No information provided')}
            ${profileField('🏆 Scholarship', s.scholarship_details || 'No scholarship information')}
            ${profileField('💻 Hackathons', s.hackathon_details || 'No hackathon participation')}
          </div>
        </div>
      </div>
      <div class="space-y-6">
        <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-200">
          <h2 class="text-base font-semibold text-gray-900 mb-4 pb-2 border-b">Academic Performance</h2>
          <div class="space-y-4">
            <div>
              <p class="text-xs text-gray-500 mb-1">CGPA</p>
              <p class="text-4xl font-bold ${parseFloat(s.cgpa)>=7.5?'text-green-600':parseFloat(s.cgpa)>=6.0?'text-yellow-600':'text-red-600'}">${parseFloat(s.cgpa).toFixed(2)}<span class="text-base text-gray-400 font-normal"> / 10</span></p>
            </div>
            <div>
              <p class="text-xs text-gray-500 mb-1">GPA (Current Semester)</p>
              <p class="text-4xl font-bold ${parseFloat(s.gpa)>=7.5?'text-green-600':parseFloat(s.gpa)>=6.0?'text-yellow-600':'text-red-600'}">${parseFloat(s.gpa).toFixed(2)}<span class="text-base text-gray-400 font-normal"> / 10</span></p>
            </div>
            <div>
              <p class="text-xs text-gray-500 mb-2">Arrears</p>
              ${s.arrears_details && s.arrears_details.trim()
                ? `<div class="bg-red-50 border border-red-200 rounded-lg p-3"><p class="text-red-800 text-sm">${s.arrears_details}</p></div>`
                : `<div class="bg-green-50 border border-green-200 rounded-lg p-3"><p class="text-green-800 text-sm font-medium">✅ No Arrears</p></div>`}
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>`;
}
function profileField(label, value) {
  return `<div><p class="text-gray-500 text-xs mb-0.5">${label}</p><p class="font-medium text-gray-900">${value}</p></div>`;
}
function downloadProfile() {
  const s = state.currentStudent;
  if (!s) return;
  const txt = `STUDENT PROFILE\n${'='.repeat(50)}\nName: ${s.student_name}\nRegister Number: ${s.register_number}\nEmail: ${s.email}\nPhone: ${s.phone_number}\nDOB: ${s.date_of_birth}\nBlood Group: ${s.blood_group}\nAddress: ${s.address}\n\nPARENT INFORMATION\nParent Name: ${s.parent_name}\nOccupation: ${s.parent_occupation}\nParent Phone: ${s.parent_phone}\n\nACADEMIC INFORMATION\nCGPA: ${s.cgpa}\nGPA: ${s.gpa}\nArrears: ${s.arrears_details||'None'}\n\nADDITIONAL\nSiblings: ${s.siblings_details||'None'}\nScholarship: ${s.scholarship_details||'None'}\nHackathons: ${s.hackathon_details||'None'}\n${'='.repeat(50)}\nGenerated: ${new Date().toLocaleString()}`;
  const a = document.createElement('a');
  a.href = 'data:text/plain;charset=utf-8,' + encodeURIComponent(txt);
  a.download = `${s.register_number}_profile.txt`;
  a.click();
}

// ─── Edit Student ─────────────────────────────────────────────────────────────
function renderEditStudent() {
  const s = state.currentStudent;
  return `
  <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <button onclick="navigate('view-student','${state.selectedStudentId}')" class="flex items-center gap-2 text-gray-600 hover:text-gray-900 mb-4 text-sm">← Back to Profile</button>
    <h1 class="text-2xl font-bold text-gray-900 mb-6">Edit Student Details</h1>
    <div id="edit-error" class="hidden bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg mb-4 text-sm"></div>
    <div id="edit-success" class="hidden bg-green-50 border border-green-200 text-green-700 px-4 py-3 rounded-lg mb-4 text-sm"></div>
    <form id="edit-form" class="bg-white rounded-xl shadow-sm p-6 border border-gray-200">
      ${s ? studentFormFields(s) : '<p class="text-gray-500 text-center py-8">Loading...</p>'}
      <div class="mt-6 flex gap-3 pt-4 border-t">
        <button type="submit" id="edit-btn" class="flex items-center gap-2 px-6 py-2.5 bg-blue-600 text-white rounded-lg font-semibold hover:bg-blue-700 transition text-sm">
          💾 Save Changes
        </button>
        <button type="button" onclick="navigate('view-student','${state.selectedStudentId}')" class="px-6 py-2.5 bg-gray-200 text-gray-700 rounded-lg font-semibold hover:bg-gray-300 transition text-sm">
          Cancel
        </button>
      </div>
    </form>
  </div>`;
}
function populateEditForm() {
  // Re-render edit page with loaded data
  const content = document.getElementById('page-content');
  if (content && state.page === 'edit-student') {
    content.innerHTML = renderEditStudent();
    bindPageEvents();
  }
}

// ─── Bind Events ──────────────────────────────────────────────────────────────
function bindPageEvents() {
  // Add Student form
  const addForm = document.getElementById('add-form');
  if (addForm) {
    addForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('add-btn');
      const errEl = document.getElementById('add-error');
      const sucEl = document.getElementById('add-success');
      errEl.classList.add('hidden'); sucEl.classList.add('hidden');
      btn.textContent = 'Saving...'; btn.disabled = true;
      const data = Object.fromEntries(new FormData(addForm).entries());
      try {
        await api('POST', '/api/students', data);
        sucEl.textContent = '✅ Student added successfully!';
        sucEl.classList.remove('hidden');
        addForm.reset();
        loadStats();
        setTimeout(() => sucEl.classList.add('hidden'), 3000);
      } catch(err) {
        errEl.textContent = err.message; errEl.classList.remove('hidden');
      } finally { btn.textContent = '💾 Add Student'; btn.disabled = false; }
    });
  }

  // Edit Student form
  const editForm = document.getElementById('edit-form');
  if (editForm) {
    editForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('edit-btn');
      const errEl = document.getElementById('edit-error');
      const sucEl = document.getElementById('edit-success');
      errEl.classList.add('hidden'); sucEl.classList.add('hidden');
      btn.textContent = 'Saving...'; btn.disabled = true;
      const data = Object.fromEntries(new FormData(editForm).entries());
      try {
        await api('PUT', `/api/students/${state.selectedStudentId}`, data);
        sucEl.textContent = '✅ Student updated successfully! Redirecting...';
        sucEl.classList.remove('hidden');
        setTimeout(() => navigate('view-student', state.selectedStudentId), 1500);
      } catch(err) {
        errEl.textContent = err.message; errEl.classList.remove('hidden');
        btn.textContent = '💾 Save Changes'; btn.disabled = false;
      }
    });
  }
}

function showError(id, msg) {
  const el = document.getElementById(id);
  if (el) { el.textContent = msg; el.classList.remove('hidden'); }
}

// ─── Boot ─────────────────────────────────────────────────────────────────────
render();
if (state.page === 'dashboard') loadStats();
</script>
